<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recuperar Senha • UNI•CET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
  </head>
  <body>
    
<header class="header-brand">
  <div class="container d-flex align-items-center justify-content-between">
    <div class="brand-title">UNI•CET</div>
    <nav aria-label="Atalhos">
      <a class="text-white small-link me-3" href="index.html">Entrar</a>
      <a class="text-white small-link me-3" href="cadastro.html">Criar Conta</a>
      <a class="text-white small-link" href="recuperar.html">Esqueci a Senha</a>
    </nav>
  </div>
</header>


<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5">
      <section class="card-soft p-4 p-md-5" aria-labelledby="titulo-recuperar">
        <h1 id="titulo-recuperar" class="h3 mb-3">Recuperar Senha</h1>
        <p class="mb-4">Informe seu e-mail. Vamos enviar um link para criar uma nova senha.</p>

        <form method="POST" action="/blac/auth/recover" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="seuemail@exemplo.com" required>
          </div>

          <div class="d-flex align-items-center justify-content-between">
            <button type="submit" class="btn btn-brand">Enviar link</button>
            <a class="small-link" href="index.html">Voltar</a>
          </div>

          <input type="hidden" name="redirect_success" value="/recuperar.html?enviado=1">
          <input type="hidden" name="redirect_error" value="/recuperar.html?erro=1">
        </form>
      </section>
    </div>
  </div>
</main>

<footer class="container my-4 footer-min">
  <hr class="soft"/>
  <p class="mb-1">Dica de acessibilidade: use a tecla <strong>Tab</strong> para navegar pelos campos.</p>
  <p class="mb-0">Precisa de ajuda? Fale com o suporte da sua escola.</p>
</footer>

</body>
</html>
