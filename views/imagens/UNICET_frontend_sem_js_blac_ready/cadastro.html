<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Criar Conta • UNI•CET</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
  </head>
  <body>
    
<header class="header-brand">
  <div class="container d-flex align-items-center justify-content-between">
    <div class="brand-title">UNI•CET</div>
    <nav aria-label="Atalhos">
      <a class="text-white small-link me-3" href="index.html">Entrar</a>
      <a class="text-white small-link me-3" href="cadastro.html">Criar Conta</a>
      <a class="text-white small-link" href="recuperar.html">Esqueci a Senha</a>
    </nav>
  </div>
</header>


<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-8">
      <section class="card-soft p-4 p-md-5" aria-labelledby="titulo-cadastro">
        <h1 id="titulo-cadastro" class="h3 mb-3">Criar Conta</h1>
        <p class="mb-4">Preencha seus dados. É rápido e você pode ajustar depois.</p>

        <form method="POST" action="/blac/auth/signup" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="nome" class="form-label">Nome completo</label>
              <input type="text" class="form-control" id="nome" name="nome" placeholder="Seu nome" required>
            </div>
            <div class="col-md-6">
              <label for="matricula" class="form-label">Matrícula (se tiver)</label>
              <input type="text" class="form-control" id="matricula" name="matricula" placeholder="Opcional">
            </div>

            <div class="col-md-6">
              <label for="email" class="form-label">E-mail</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="seuemail@exemplo.com" required>
            </div>
            <div class="col-md-6">
              <label for="turma" class="form-label">Turma</label>
              <select id="turma" name="turma" class="form-select" required>
                <option value="" selected disabled>Escolha sua turma</option>
                <option>6º ano</option>
                <option>7º ano</option>
                <option>8º ano</option>
                <option>9º ano</option>
                <option>1ª série</option>
                <option>2ª série</option>
                <option>3ª série</option>
                <option>Outros</option>
              </select>
            </div>

            <div class="col-md-6">
              <label for="senha" class="form-label">Crie uma senha</label>
              <input type="password" class="form-control" id="senha" name="senha" minlength="6" placeholder="Mínimo 6 caracteres" required autocomplete="new-password">
            </div>
            <div class="col-md-6">
              <label for="senha2" class="form-label">Confirme a senha</label>
              <input type="password" class="form-control" id="senha2" name="senha2" minlength="6" placeholder="Repita a senha" required autocomplete="new-password">
            </div>
          </div>

          <div class="form-check my-3">
            <input class="form-check-input" type="checkbox" value="1" id="termos" required>
            <label class="form-check-label" for="termos">
              Li e concordo com as regras do uso do portal.
            </label>
          </div>

          <div class="d-flex align-items-center gap-2">
            <button type="submit" class="btn btn-brand">Criar conta</button>
            <a class="small-link" href="index.html">Já tenho conta</a>
          </div>

          <input type="hidden" name="redirect_success" value="/painel.html">
          <input type="hidden" name="redirect_error" value="/cadastro.html?erro=1">
        </form>
      </section>
    </div>
  </div>
</main>

<footer class="container my-4 footer-min">
  <hr class="soft"/>
  <p class="mb-1">Dica de acessibilidade: use a tecla <strong>Tab</strong> para navegar pelos campos.</p>
  <p class="mb-0">Precisa de ajuda? Fale com o suporte da sua escola.</p>
</footer>

</body>
</html>
